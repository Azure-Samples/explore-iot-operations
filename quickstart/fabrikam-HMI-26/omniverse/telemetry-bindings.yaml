        type: string

  - name: painting_telemetry
    topic: factory/painting
    id_field: machine_id
    prim_root: /World/Factory/Painting
    attributes:
      - source: $.status
        target: state:status
        type: token
      - source: $.coat_thickness_um
        target: metrics:coatThickness
        type: float
      - source: $.quality
        target: metrics:quality
        type: token
      - source: $.timestamp
