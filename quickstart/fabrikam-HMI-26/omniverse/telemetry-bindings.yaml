      - source: $.separation_purity_pct
        target: metrics:separationPurity
        type: float
      - source: $.hdpe_recovery_pct
        target: metrics:hdpeRecovery
        type: float
      - source: $.timestamp
        target: metrics:lastUpdate
        type: string

  - name: centrifugal_dryer
    topic: fabrikam/mechanical_drying
    id_field: machine_id
    prim_root: /World/Plant/Drying
    attributes:
      - source: $.run_state
        target: state:status
        type: token
      - source: $.outlet_moisture_pct
        target: metrics:outletMoisture
        type: float
      - source: $.throughput_kg_hr
        target: metrics:throughput
        type: float
      - source: $.timestamp
