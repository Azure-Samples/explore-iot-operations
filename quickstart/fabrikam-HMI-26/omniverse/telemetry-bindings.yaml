  - name: pelletizer
    topic: fabrikam/pelletizing
    id_field: machine_id
    prim_root: /World/Plant/Pelletizing
    attributes:
      - source: $.fault_state
        target: state:status
        type: token
      - source: $.pellet_size_avg_mm
        target: metrics:pelletSizeAvg
        type: float
      - source: $.throughput_kg_hr
        target: metrics:throughput
        type: float
      - source: $.strand_break_events
        target: metrics:strandBreaks
        type: int
      - source: $.timestamp
        target: metrics:lastUpdate
        type: string

  - name: packaging
    topic: fabrikam/packaging
    id_field: machine_id
    prim_root: /World/Plant/Packaging
    attributes:
      - source: $.run_state
        target: state:status
        type: token
      - source: $.bag_weight_kg
        target: metrics:bagWeight
        type: float
      - source: $.bags_per_hr
        target: metrics:bagsPerHr
        type: float
      - source: $.lot_id
        target: metrics:currentLot
        type: string
      # Colour scan fields - drive colour_quality_variants overlay on the prim
      - source: $.colour_r
        target: metrics:colourR
        type: int
      - source: $.colour_g
        target: metrics:colourG
        type: int
      - source: $.colour_b
        target: metrics:colourB
        type: int
      - source: $.quality_classification
        target: state:colourQuality
        type: token
      - source: $.timestamp
        target: metrics:lastUpdate
        type: string
