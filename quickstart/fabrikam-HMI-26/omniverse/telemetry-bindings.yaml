    attributes:
      - source: $.status
        target: state:status
        type: token
      - source: $.weld_current_amps
        target: metrics:weldCurrent
        type: float
      - source: $.weld_temp_celsius
        target: metrics:weldTemp
        type: float
      - source: $.quality
        target: metrics:quality
        type: token
      - source: $.timestamp
